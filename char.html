<!DOCTYPE html>

<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude API Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a26;
      --border: #2a2a3d; --accent: #7c6af7; --accent2: #a78bfa;
      --text: #e8e8f0; --muted: #6b6b8a; --user-bg: #1e1b3a;
      --ai-bg: #131320; --success: #4ade80; --error: #f87171;
    }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -30%; left: -20%;
      width: 60%; height: 60%;
      background: radial-gradient(ellipse, rgba(124,106,247,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    header {
      position: relative; z-index: 10; padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; gap: 10px;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 12px var(--accent); }
      50% { opacity:.6; box-shadow: 0 0 4px var(--accent); }
    }
    .status-badge { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .header-fields { display: flex; gap: 8px; flex-wrap: wrap; }
    .field-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
    .field-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .field-input-wrap { position: relative; display: flex; align-items: center; }
    .field-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 11px; padding: 7px 12px; outline: none; transition: border-color .2s;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--muted); }
    #apiKeyField { padding-right: 34px; }
    .toggle-key {
      position: absolute; right: 8px; background: none; border: none;
      cursor: pointer; color: var(--muted); font-size: 13px; padding: 2px; transition: color .2s;
    }
    .toggle-key:hover { color: var(--accent2); }
    .chat-area {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 1;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; opacity: .4;
    }
    .empty-icon { font-size: 48px; }
    .empty-text { font-family: 'Syne', sans-serif; font-size: 13px; color: var(--muted); text-align: center; }
    .message { display: flex; gap: 12px; animation: fadeIn .3s ease-out; max-width: 820px; }
    @keyframes fadeIn {
      from { opacity:0; transform: translateY(10px); }
      to { opacity:1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .avatar {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; font-family: 'Syne', sans-serif; font-weight: 700;
    }
    .message.user .avatar { background: linear-gradient(135deg, var(--accent), #a855f7); color: white; }
    .message.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--accent2); font-size: 16px; }
    .bubble {
      padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.7;
      max-width: 620px; white-space: pre-wrap; word-break: break-word;
    }
    .message.user .bubble { background: var(--user-bg); border: 1px solid rgba(124,106,247,.3); border-top-right-radius: 4px; }
    .message.assistant .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .typing { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-6px);opacity:1} }
    .input-area {
      position: relative; z-index: 10; padding: 14px 20px 18px;
      border-top: 1px solid var(--border); background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
    }
    .input-wrap { display: flex; gap: 10px; align-items: flex-end; max-width: 820px; margin: 0 auto; }
    #userInput {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
      padding: 12px 16px; outline: none; resize: none; min-height: 46px; max-height: 160px;
      line-height: 1.5; transition: border-color .2s;
    }
    #userInput:focus { border-color: var(--accent); }
    #userInput::placeholder { color: var(--muted); }
    .send-btn {
      width: 46px; height: 46px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      color: white; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .1s; flex-shrink: 0;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .hint { text-align: center; font-size: 10px; color: var(--muted); margin-top: 8px; max-width: 820px; margin-left: auto; margin-right: auto; }
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 10px 20px; border-radius: 8px; font-size: 12px;
      opacity: 0; transition: opacity .3s, transform .3s;
      z-index: 100; pointer-events: none; max-width: 420px; text-align: center;
    }
    .toast.error { background: #2d1515; border: 1px solid var(--error); color: var(--error); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-dot"></div>
      Claude API Chat
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Bagli degil</span>
    </div>
  </div>
  <div class="header-fields">
    <div class="field-group">
      <div class="field-label">Proxy URL</div>
      <input class="field-input" type="text" id="proxyUrl"
        placeholder="https://senin-projen.vercel.app/api/proxy"/>
    </div>
    <div class="field-group">
      <div class="field-label">API Key</div>
      <div class="field-input-wrap">
        <input class="field-input" type="password" id="apiKeyField"
          placeholder="sk-ant-..." autocomplete="off"/>
        <button class="toggle-key" onclick="toggleKey()">goster</button>
      </div>
    </div>
  </div>
</header>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">&#9672;</div>
    <div class="empty-text">Proxy URL ve API Key'i gir,<br/>ardindan mesaj gonder</div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Mesajini buraya yaz..."
      rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
  </div>
  <div class="hint">Enter = Gonder | Shift+Enter = Yeni satir</div>
</div>

<div class="toast error" id="toast"></div>

<script>
  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const toast = document.getElementById('toast');

  let messages = [];
  let isLoading = false;

  function toggleKey() {
    const f = document.getElementById('apiKeyField');
    f.type = f.type === 'password' ? 'text' : 'password';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  function setStatus(connected) {
    statusDot.className = 'status-dot' + (connected ? ' connected' : '');
    statusText.textContent = connected ? 'Baglandi' : 'Bagli degil';
  }

  function appendMessage(role, content) {
    emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'S' : 'C';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';
    wrap.id = 'typingIndicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'C';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const proxyUrl = document.getElementById('proxyUrl').value.trim();
    const apiKey = document.getElementById('apiKeyField').value.trim();
    const text = userInput.value.trim();

    if (!proxyUrl) { showToast('Proxy URL girilmedi!'); return; }
    if (!apiKey)   { showToast('API Key girilmedi!'); return; }
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    messages.push({ role: 'user', content: text });
    appendMessage('user', text);
    showTyping();

    try {
      const response = await fetch(proxyUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          messages: messages
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data?.error?.message || 'HTTP ' + response.status);

      const reply = data.content?.[0]?.text || '(bos yanit)';
      messages.push({ role: 'assistant', content: reply });
      removeTyping();
      appendMessage('assistant', reply);
      setStatus(true);

    } catch (err) {
      removeTyping();
      messages.pop();
      setStatus(false);
      showToast('Hata: ' + err.message);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }
</script>

</body>
</html>
